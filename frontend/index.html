<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="/ui/manifest.webmanifest">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta name="theme-color" content="#0d6efd">
  <title>IFG</title>
  <link rel="stylesheet" href="/ui/static/style.css">
</head>
<body>

<header class="app-header">
  <h1>📄 Faktury</h1>
  <div class="header-actions">
    <button class="btn-icon" id="btn-logout" title="Wyloguj się">⎋</button>
  </div>
</header>

<nav class="top-nav" aria-label="Nawigacja faktur">
  <a class="top-nav-link" data-view-link="current-month-sales" href="/ui/?view=current-month-sales">Sprzedaż w obecnym miesiącu</a>
  <a class="top-nav-link" data-view-link="sales" href="/ui/?view=sales">Faktury sprzedaż</a>
  <a class="top-nav-link" data-view-link="purchase" href="/ui/?view=purchase">Faktury zakup</a>
</nav>

<main class="main-content">
  <div id="view-hint" class="view-hint" style="display:none;"></div>

  <!-- Filters -->
  <form class="filter-bar" id="filter-form" autocomplete="off">
    <div class="filter-group">
      <label for="f-status">Status</label>
      <select id="f-status">
        <option value="">Wszystkie</option>
        <option value="draft">Szkic</option>
        <option value="ready_for_submission">Gotowa do wysyłki</option>
        <option value="sending">Wysyłanie</option>
        <option value="accepted">Zatwierdzona</option>
        <option value="rejected">Odrzucona</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="f-date-from">Data od</label>
      <input type="date" id="f-date-from">
    </div>
    <div class="filter-group">
      <label for="f-date-to">Data do</label>
      <input type="date" id="f-date-to">
    </div>
    <div class="filter-group">
      <label for="f-number">Numer</label>
      <input type="text" id="f-number" placeholder="Szukaj po numerze…">
    </div>
    <div class="filter-group" style="justify-content: flex-end; flex: 0 0 auto;">
      <button type="submit" class="btn btn-primary" style="height: 38px;">Szukaj</button>
    </div>
  </form>

  <!-- Invoice list -->
  <div id="invoice-list">
    <div class="state-loading">Ładowanie</div>
  </div>

  <!-- Pagination -->
  <div class="pagination" id="pagination" style="display:none;">
    <span id="pagination-info"></span>
    <div class="pagination-btns">
      <button class="btn btn-outline" id="btn-prev" disabled>‹ Poprzednia</button>
      <button class="btn btn-outline" id="btn-next" disabled>Następna ›</button>
    </div>
  </div>
</main>

<script type="module">
  import { requireAuth, clearToken, api, badgeHtml, formatMoney, escHtml, setError, showToast } from "/ui/static/app.js";

  requireAuth();

  const VIEWS = {
    CURRENT_MONTH_SALES: "current-month-sales",
    SALES: "sales",
    PURCHASE: "purchase",
  };
  const params = new URLSearchParams(window.location.search);
  const requestedView = params.get("view");
  const currentView = Object.values(VIEWS).includes(requestedView) ? requestedView : VIEWS.SALES;

  const PAGE_SIZE = 20;
  let currentPage = 1;
  let totalItems = 0;

  /* ---- Elements ---- */
  const listEl = document.getElementById("invoice-list");
  const paginationEl = document.getElementById("pagination");
  const paginationInfo = document.getElementById("pagination-info");
  const btnPrev = document.getElementById("btn-prev");
  const btnNext = document.getElementById("btn-next");
  const filterForm = document.getElementById("filter-form");
  const viewHint = document.getElementById("view-hint");

  /* ---- Logout ---- */
  document.getElementById("btn-logout").addEventListener("click", () => {
    clearToken();
    window.location.href = "/ui/login";
  });

  /* ---- Filters ---- */
  filterForm.addEventListener("submit", (e) => {
    e.preventDefault();
    currentPage = 1;
    loadInvoices();
  });

  /* ---- Pagination ---- */
  btnPrev.addEventListener("click", () => { currentPage--; loadInvoices(); });
  btnNext.addEventListener("click", () => { currentPage++; loadInvoices(); });

  function getCurrentMonthDateRange() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const start = new Date(year, month, 1);
    const end = new Date(year, month + 1, 0);
    return {
      start: start.toISOString().slice(0, 10),
      end: end.toISOString().slice(0, 10),
    };
  }

  function applyViewState() {
    document.querySelectorAll("[data-view-link]").forEach((link) => {
      if (link.dataset.viewLink === currentView) {
        link.classList.add("is-active");
        link.setAttribute("aria-current", "page");
      } else {
        link.classList.remove("is-active");
        link.removeAttribute("aria-current");
      }
    });

    const showFilters = currentView === VIEWS.SALES;
    filterForm.style.display = showFilters ? "flex" : "none";

    if (currentView === VIEWS.CURRENT_MONTH_SALES) {
      const monthRange = getCurrentMonthDateRange();
      viewHint.style.display = "block";
      viewHint.textContent = `Pokazane są wyłącznie faktury sprzedaży z okresu ${monthRange.start} - ${monthRange.end}.`;
    } else if (currentView === VIEWS.PURCHASE) {
      viewHint.style.display = "block";
      viewHint.textContent = "Widok prezentuje faktury zakupowe (jeśli są dostępne w systemie).";
    } else {
      viewHint.style.display = "none";
      viewHint.textContent = "";
    }
  }

  /* ---- Load ---- */
  async function loadInvoices() {
    listEl.innerHTML = `<div class="state-loading">Ładowanie</div>`;
    paginationEl.style.display = "none";

    const params = {
      status: document.getElementById("f-status").value,
      issue_date_from: document.getElementById("f-date-from").value,
      issue_date_to: document.getElementById("f-date-to").value,
      number_filter: document.getElementById("f-number").value,
      page: currentPage,
      size: PAGE_SIZE,
    };

    if (currentView === VIEWS.CURRENT_MONTH_SALES) {
      const monthRange = getCurrentMonthDateRange();
      params.direction = "sale";
      params.issue_date_from = monthRange.start;
      params.issue_date_to = monthRange.end;
    } else if (currentView === VIEWS.PURCHASE) {
      params.direction = "purchase";
      params.issue_date_from = "";
      params.issue_date_to = "";
      params.number_filter = "";
      params.status = "";
    }

    try {
      const data = await api.listInvoices(params);
      if (!data) return;
      totalItems = data.total;
      renderList(data.items);
      renderPagination();
    } catch (err) {
      setError(listEl, err.message);
    }
  }

  function renderList(invoices) {
    if (!invoices.length) {
      listEl.innerHTML = `<div class="state-empty">Brak faktur spełniających kryteria.</div>`;
      return;
    }

    listEl.innerHTML = invoices
      .map(
        (inv) => `
        <div class="card card-clickable" data-id="${escHtml(inv.id)}" role="button" tabindex="0"
             aria-label="Faktura ${escHtml(inv.number_local || "szkic")}">
          <div class="card-header">
            <div>
              <div class="card-number">${escHtml(inv.number_local || "— Szkic —")}</div>
              <div class="card-date">Wystawiona: ${escHtml(inv.issue_date)}</div>
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
              ${badgeHtml(inv.payment_status ?? "unpaid")}
              ${badgeHtml(inv.status)}
            </div>
          </div>
          <div class="card-body">
            ${escHtml(inv.buyer_snapshot?.name ?? "")}
            ${inv.buyer_snapshot?.nip ? `&bull; NIP ${escHtml(inv.buyer_snapshot.nip)}` : ""}
          </div>
          <div class="card-footer">
            <span class="card-amount">${formatMoney(inv.total_gross, inv.currency)}</span>
            <span style="font-size:12px;color:var(--color-muted);">
              Sprzedaż: ${escHtml(inv.sale_date)}
            </span>
          </div>
        </div>
      `
      )
      .join("");

    /* navigate on click / keyboard */
    listEl.querySelectorAll(".card-clickable").forEach((card) => {
      const go = () => {
        window.location.href = `/ui/invoice?id=${card.dataset.id}`;
      };
      card.addEventListener("click", go);
      card.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") go(); });
    });
  }

  function renderPagination() {
    const totalPages = Math.ceil(totalItems / PAGE_SIZE);
    if (totalPages <= 1) { paginationEl.style.display = "none"; return; }

    paginationEl.style.display = "flex";
    paginationInfo.textContent = `Strona ${currentPage} z ${totalPages} (${totalItems} faktur)`;
    btnPrev.disabled = currentPage <= 1;
    btnNext.disabled = currentPage >= totalPages;
  }

  /* ---- Initial load ---- */
  applyViewState();
  loadInvoices();
</script>
</body>
</html>
